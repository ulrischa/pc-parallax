name: Publish demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static demo
        run: |
          mkdir -p _site
          cp demo/demo.css _site/demo.css
          cp src/pc-parallax.css _site/pc-parallax.css
          sed 's#../src/pc-parallax.css#./pc-parallax.css#g' demo/index.htm > _site/index.html
          cp _site/index.html _site/index.htm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
